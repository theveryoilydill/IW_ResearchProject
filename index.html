<!DOCTYPE html>
<html>
<head>
  <title>My first Vue page</title>

  <style>
    #app {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .toolbar {
      margin-bottom: 20px;
    }
    .toolbar button {
      margin-right: 10px;
      padding: 8px 16px;
      cursor: pointer;
    }
    .tabs {
      border: 1px solid #ccc;
    }
    .tab-headers {
      display: flex;
      background-color: #f1f1f1;
    }
    .tab-headers div {
      padding: 10px 20px;
      cursor: pointer;
      border-right: 1px solid #ccc;
    }
    .tab-headers div.active {
      background-color: white;
      border-bottom: 1px solid white;
    }
    .tab-content {
      padding: 20px;
      min-height: 400px;
    }
    iframe {
      width: 100%;
      height: 400px;
      border: none;
    }
    .add-tab {
      margin-top: 20px;
    }
    .add-tab input {
      margin-right: 10px;
      padding: 8px;
      width: 200px;
    }
    .add-tab button {
      padding: 8px 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Vue Tabs System</h1>

<div id="app">
  <div class="toolbar">
    <button @click="start">Start</button>
    <button @click="stop">Stop</button>
    <button @click="fullscreen">Fullscreen</button>
  </div>

  <div class="tabs">
    <div class="tab-headers" v-if="tabs.length > 0">
      <div v-for="(tab, index) in tabs" :key="tab.id" @click="currentTab = index" :class="{active: currentTab === index}">{{ tab.title }}</div>
    </div>
    <div class="tab-content">
      <iframe v-if="currentTab !== null" :src="tabs[currentTab].src" sandbox="allow-same-origin allow-scripts" ref="currentIframe"></iframe>
    </div>
  </div>

  <div class="add-tab">
    <input v-model="newTitle" placeholder="Tab Title" />
    <input v-model="newUrl" placeholder="Tab URL" />
    <button @click="addTab">Add Tab</button>
  </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<script>
  // Easily set your links here in this array
  const urls = [
    'https://gn-math.dev',
    'https://poxel.io',
  ];

  const app = Vue.createApp({
    data() {
      return {
        tabs: urls.map((url, index) => ({
          id: index + 1,
          title: `Tab ${index + 1}`,
          url: url,
          src: ''
        })),
        currentTab: urls.length > 0 ? 0 : null,
        newTitle: '',
        newUrl: ''
      }
    },
    methods: {
      start() {
        if (this.currentTab !== null) {
          this.tabs[this.currentTab].src = this.tabs[this.currentTab].url;
        }
      },
      stop() {
        if (this.currentTab !== null) {
          this.tabs[this.currentTab].src = '';
        }
      },
      fullscreen() {
        if (this.$refs.currentIframe && this.$refs.currentIframe.requestFullscreen) {
          this.$refs.currentIframe.requestFullscreen();
        }
      },
      addTab() {
        if (this.newTitle && this.newUrl) {
          this.tabs.push({
            id: Date.now(),
            title: this.newTitle,
            url: this.newUrl,
            src: ''
          });
          if (this.currentTab === null) {
            this.currentTab = this.tabs.length - 1;
          }
          this.newTitle = '';
          this.newUrl = '';
        }
      }
    }
  });

  app.mount('#app');
</script>

</body>
</html>
